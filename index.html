<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IBD PBS Prescriber Helper</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>
<h1>IBD PBS Prescriber Helper</h1>
</header>

<div class="controls">

<input id="search" type="text" placeholder="Search drug or PBS code">

<select id="diseaseFilter">
<option value="">All diseases</option>
<option value="Crohn's disease">Crohn's disease</option>
<option value="Ulcerative colitis">Ulcerative colitis</option>
</select>

<select id="phaseFilter">
<option value="">All phases</option>
<option value="Initial">Initial</option>
<option value="Continuing">Continuing</option>
</select>

</div>

<table id="results">
<thead>
<tr>
<th>Drug</th>
<th>Disease</th>
<th>Phase</th>
<th>Formulation</th>
<th>PBS Code</th>
<th>Authority</th>
<th>Section</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
